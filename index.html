<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }
    h1 {
      font-size: 24px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      font-size: 16px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    .banner {
      margin-top: 20px;
      padding: 15px;
      background: #222;
      color: white;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h1>📅 오늘 기록</h1>

<div class="card">
  <label>검색 유무</label>
  <select id="search">
    <option value="">선택</option>
    <option value="O">O</option>
    <option value="X">X</option>
  </select>

  <label>충동 횟수</label>
  <input type="number" id="urge">

  <label>5초컷 성공률 (%)</label>
  <input type="number" id="fastSuccess">

  <label>대체 행동</label>
  <select id="altAction">
    <option value="">선택</option>
    <option value="O">O</option>
    <option value="X">X</option>
  </select>

  <label>한 줄 전진</label>
  <input type="text" id="progress">

  <button onclick="saveData()">저장</button>
</div>

<div class="card">
  <h3>📊 기록</h3>
  <div id="history"></div>
</div>

<div class="banner" id="banner"></div>

<script>
// 날짜
function getToday() {
  return new Date().toISOString().split('T')[0];
}

// 오늘 데이터 자동 생성
function ensureTodayData() {
  let data = JSON.parse(localStorage.getItem("trackerData")) || [];
  const today = getToday();

  const exists = data.some(d => d.date === today);

  if (!exists) {
    data.push({
      date: today,
      search: "",
      urge: "",
      fastSuccess: "",
      altAction: "",
      progress: ""
    });

    localStorage.setItem("trackerData", JSON.stringify(data));
  }
}

// 저장
function saveData() {
  let data = JSON.parse(localStorage.getItem("trackerData")) || [];
  const today = getToday();

  const index = data.findIndex(d => d.date === today);

  if (index !== -1) {
    data[index].search = document.getElementById("search").value;
    data[index].urge = document.getElementById("urge").value;
    data[index].fastSuccess = document.getElementById("fastSuccess").value;
    data[index].altAction = document.getElementById("altAction").value;
    data[index].progress = document.getElementById("progress").value;
  }

  localStorage.setItem("trackerData", JSON.stringify(data));

  location.reload(); // 자동 새로고침
}

// 기록 출력
function render() {
  let data = JSON.parse(localStorage.getItem("trackerData")) || [];
  const historyDiv = document.getElementById("history");

  historyDiv.innerHTML = "";

  data.slice().reverse().forEach(d => {
    const div = document.createElement("div");
    div.style.marginBottom = "10px";
    div.innerHTML = `
      <strong>${d.date}</strong><br>
      검색: ${d.search} / 충동: ${d.urge} / 5초컷: ${d.fastSuccess}%<br>
      대체행동: ${d.altAction}<br>
      전진: ${d.progress}
    `;
    historyDiv.appendChild(div);
  });
}

// 랜덤 대체행동 배너
function renderBanner() {
  const messages = [
    "5초 안에 다른 행동으로 전환",
    "지금 물 한잔 마시기",
    "자리에서 일어나기",
    "핸드폰 내려놓고 1분 버티기",
    "메모 앱 열고 아무거나 쓰기",
    "창문 밖 보기",
    "손으로 뭐라도 만지기",
    "지금 하고 있던 일 1줄만 더 하기",
    "유튜브 대신 음악만 틀기",
    "딱 10초만 참아보기"
  ];

  const random = messages[Math.floor(Math.random() * messages.length)];
  document.getElementById("banner").innerText = random;
}

// 실행
window.onload = function() {
  ensureTodayData();
  render();
  renderBanner();
};
</script>

</body>
</html>
