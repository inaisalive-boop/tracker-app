<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }
    h1 {
      font-size: 24px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      font-size: 16px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <h1>📅 오늘 기록</h1>

  <div class="card">
    <label>검색(덕질) 했나?</label>
    <input type="number" id="search" placeholder="0">

    <label>충동 몇 번?</label>
    <input type="number" id="urge" placeholder="0">

    <label>무시 성공 몇 번?</label>
    <input type="number" id="success" placeholder="0">

    <label>메모</label>
    <input type="text" id="note" placeholder="한줄 기록">

    <button onclick="saveData()">저장</button>
  </div>

  <div class="card">
    <h3>📊 기록 보기</h3>
    <div id="history"></div>
  </div>

<script>
function getToday() {
  return new Date().toISOString().split('T')[0];
}

// ✅ 날짜 체크 + 자동 생성
function checkNewDay() {
  const today = getToday();
  const savedDate = localStorage.getItem("lastDate");

  let data = JSON.parse(localStorage.getItem("trackerData")) || [];

  if (savedDate !== today) {
    data.push({
      date: today,
      search: 0,
      urge: 0,
      success: 0,
      note: ""
    });

    localStorage.setItem("trackerData", JSON.stringify(data));
    localStorage.setItem("lastDate", today);
  }
}

// ✅ 저장
function saveData() {
  let data = JSON.parse(localStorage.getItem("trackerData")) || [];
  const today = getToday();

  const index = data.findIndex(d => d.date === today);

  if (index !== -1) {
    data[index].search = document.getElementById("search").value || 0;
    data[index].urge = document.getElementById("urge").value || 0;
    data[index].success = document.getElementById("success").value || 0;
    data[index].note = document.getElementById("note").value || "";
  }

  localStorage.setItem("trackerData", JSON.stringify(data));

  // ✅ 자동 새로고침
  location.reload();
}

// ✅ 화면 출력
function render() {
  let data = JSON.parse(localStorage.getItem("trackerData")) || [];
  const historyDiv = document.getElementById("history");

  historyDiv.innerHTML = "";

  data.slice().reverse().forEach(d => {
    const div = document.createElement("div");
    div.style.marginBottom = "10px";
    div.innerHTML = `
      <strong>${d.date}</strong><br>
      검색: ${d.search} / 충동: ${d.urge} / 성공: ${d.success}<br>
      메모: ${d.note}
    `;
    historyDiv.appendChild(div);
  });
}

// ✅ 실행
window.onload = function() {
  checkNewDay();
  render();
};
</script>

</body>
</html>
